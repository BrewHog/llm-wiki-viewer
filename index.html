<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wiki</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  <link id="hljs-light" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css" />
  <link id="hljs-dark" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" disabled />
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="/" class="brand" id="home-link">
        <span class="brand-dot"></span>
        <span class="brand-text" id="brand-text">Wiki</span>
      </a>
      <div class="sidebar-header-actions">
        <button class="icon-btn" id="open-wiki-btn" title="Open a different wiki" aria-label="Open wiki">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        </button>
        <button class="icon-btn" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        </button>
        <button class="icon-btn hamburger" id="hamburger" title="Toggle navigation" aria-label="Toggle navigation">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>
    </div>
    <div class="sidebar-body" id="sidebar-body">
      <div class="sidebar-search">
        <input type="search" id="search-input" placeholder="Search   (Ctrl K)" autocomplete="off" />
        <div class="search-results" id="search-results" hidden></div>
      </div>
      <nav class="tree" id="tree"></nav>
      <div class="sidebar-footer">
        <span id="page-count">—</span>
        <span class="muted">·</span>
        <a href="#" id="who-link" class="muted-link" title="Set your name for audit comments">unnamed</a>
        <span class="muted">·</span>
        <a href="#" id="inbox-btn" class="muted-link" title="View feedback inbox">inbox</a>
      </div>
    </div>
  </aside>

  <main class="content" id="content">
    <header class="article-header" id="article-header" hidden>
      <div class="breadcrumb" id="breadcrumb"></div>
      <h1 id="article-title"></h1>
      <div class="frontmatter-strip" id="frontmatter-strip"></div>
    </header>
    <article class="article" id="article"></article>
    <div class="backlinks-section" id="backlinks-section" hidden>
      <div class="backlinks-heading">
        Linked from
        <span class="backlinks-count" id="backlinks-count"></span>
      </div>
      <div class="backlinks-inner" id="backlinks-inner"></div>
    </div>
    <div class="welcome" id="welcome">
      <h1 id="welcome-title">Wiki</h1>
      <p class="lede" id="welcome-tagline"></p>
      <div class="welcome-grid" id="welcome-grid"></div>
    </div>

    <!-- Wiki picker (shown when no wiki loaded, or user clicks "open wiki") -->
    <div class="picker" id="picker" hidden>
      <div class="picker-inner">
        <h1 class="picker-heading">Open a wiki</h1>

        <div class="picker-section" id="picker-recents-section" hidden>
          <div class="picker-section-label">Recent</div>
          <div class="picker-recents" id="picker-recents"></div>
        </div>

        <div class="picker-section">
          <div class="picker-section-label">Browse</div>
          <div class="picker-path-bar">
            <div class="picker-breadcrumb" id="picker-breadcrumb"></div>
            <button class="picker-up-btn" id="picker-up-btn" title="Go up one directory">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
              Up
            </button>
          </div>
          <div class="picker-entries" id="picker-entries"></div>
        </div>

        <div class="picker-open-row">
          <input type="text" class="picker-path-input" id="picker-path-input" placeholder="/path/to/wiki-root" spellcheck="false" />
          <button class="btn-primary" id="picker-open-btn">Open</button>
        </div>
        <div class="picker-error" id="picker-error" hidden></div>
      </div>
    </div>
  </main>

  <div class="selection-toolbar" id="selection-toolbar" hidden>
    <button id="audit-btn" class="selection-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      Add feedback
    </button>
  </div>

  <!-- Audit submission modal -->
  <div class="modal-backdrop" id="modal-backdrop" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2>File feedback</h2>
        <button class="icon-btn" id="modal-close" aria-label="Close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="modal-section">
          <div class="modal-label">Selected text</div>
          <div class="selection-preview" id="selection-preview"></div>
        </div>
        <div class="modal-section">
          <div class="modal-label">Severity</div>
          <div class="severity-row" id="severity-row">
            <button class="sev-btn" data-sev="info">info</button>
            <button class="sev-btn" data-sev="suggest">suggest</button>
            <button class="sev-btn active" data-sev="warn">warn</button>
            <button class="sev-btn" data-sev="error">error</button>
          </div>
        </div>
        <div class="modal-section">
          <label class="modal-label" for="author-input">Your name</label>
          <input type="text" id="author-input" placeholder="e.g. justin" />
        </div>
        <div class="modal-section">
          <label class="modal-label" for="comment-input">Comment</label>
          <textarea id="comment-input" rows="5" placeholder="What's wrong, missing, or worth noting?"></textarea>
        </div>
        <div class="modal-error" id="modal-error" hidden></div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" id="modal-cancel">Cancel</button>
        <button class="btn-primary" id="modal-submit">File feedback</button>
      </div>
    </div>
  </div>

  <!-- Audit inbox modal -->
  <div class="modal-backdrop" id="inbox-backdrop" hidden>
    <div class="modal modal--wide" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2>Feedback inbox</h2>
        <button class="icon-btn" id="inbox-close" aria-label="Close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="inbox-filter-row" id="inbox-filter-row">
        <button class="inbox-filter-btn active" data-filter="open">Open</button>
        <button class="inbox-filter-btn" data-filter="all">All</button>
      </div>
      <div class="modal-body">
        <div id="inbox-list"></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" hidden></div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/highlight.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
